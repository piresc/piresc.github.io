work_experience:
  - role: Software_Engineer
    company: Tokopedia
    period: Jul 2022 - Aug 2024
    location: Indonesia
    summary: |
      Managed digital fulfillment ecosystem for 4,000+ SKUs across 100+ suppliers, handling high-traffic microservices (>300 RPS). 
      Maintained a 98% Fulfillment Success Rate through rigorous testing, proactive monitoring, and cross-team collaboration.
    key_projects:
      - id: fulfillmentDropdown
        title: Fulfillment Nextgen
        description: |
          Built new microservices to decouple fulfillment logic, drastically speeding up development and deployment cycles.
        impact:
          - Streamlined: reconciliation process (Kartu Prakerja) and improved deployment efficiency.
          - Ensured: smooth operations during high-peak traffic events (Ramadan 2023 & 2024).
      - id: smartCardDropdown
        title: Smart-Card Auto Escalation
        description: |
          Developed an auto-escalation feature for Smart Card issues to resolve errors without manual intervention.
        impact:
          - Support Efficiency: Automated escalation reduced customer support tickets by 60%.
          - Cost Savings: Monthly savings reached tens of millions of rupiah through reduced operational costs.
          - User Convenience: Users no longer had to manually report issues, improving their experience.
      - id: performance
        title: High-Performance & Cost Optimization
        description: |
          A comprehensive initiative to improve system latency, reliability, and cloud efficiency.
        impact:
          - Latency: Improved order fulfillment speed from 4s to 1s.
          - Conversion: Achieved a 200% CVR improvement by optimizing caching strategies.
          - Reliability: Eliminated Single Point of Failure (SPOF) by implementing auto-scaling for cron jobs.
          - Cost: Reduced cloud infrastructure costs by refactoring specific services into a monolithic architecture.
