  - role: Developer
    company: Apple Developer Academy
    period: 2020
    location: Indonesia
    summary: Selected as one of 200 individuals from 2,500+ applicants across Indonesia. Built and shipped 7 iOS applications using Swift, acting as both Developer and Product Owner. Joined and contributed to the development of two macro projects, Videre (Mumu) and Lugna, simultaneously for three months.
    projects:
      - id: lugnaDropdown
        title: Lugna Smart Journaling App
        description: Lugna is a smart journaling app that enables users to pour their thoughts and feelings through journaling, which can be used as a form of communication between patients, caregivers, and psychiatrists. Lugna has personalized questions to guide users in journaling. Lugna also has stats to give overviews on users' moods weekly and monthly.
        impact:
          - Mental Health Support: Improved the journaling process, allowing users to better communicate their thoughts and emotions with caregivers and psychiatrists.
          - User Engagement: Personalized questions guided users through journaling, leading to increased user interaction and more meaningful entries.
          - Mood Tracking: Enabled users to track and understand their moods through weekly and monthly stats, contributing to better self-awareness and mental health management.
        strengths:
          - Research: Conducted interviews with mental health patients and experts to inform design decisions.
          - UI/UX Design: Designed intuitive interfaces for iPhone, iPad, and the web.
          - Testing: Led user testing to validate usability and effectiveness.
      - id: videreMumuDropdown
        title: Videre/Mumu AR App
        description: Videre is an app that helps visual artists visualize and measure grid and artwork arrangements using Augmented Reality (AR). It is an advanced evolution of MUMU, which was originally developed to assist mural artists by simplifying the process of calculating grid sizes and overlaying them on reference designs with AR. Videre expands on these capabilities, offering an upgraded experience with enhanced creative tools and more advanced features for all visual artists.
        impact:
          - Creative Process Enhancement: Streamlined the process for visual and mural artists, reducing the time and effort required for grid calculation and design visualization.
          - Increased Productivity: Enabled artists to easily arrange artwork using AR, improving their workflow and precision.
          - Tool Adoption: Provided advanced creative tools, leading to broader adoption among various types of visual artists.
        strengths:
          - Development: Implemented MVC architecture, camera functions, and AR features.
          - AR Integration: Improved the user experience by incorporating augmented reality.
          - Cloud Integration: Built cloud save functionality using Core Data with CloudKit.
