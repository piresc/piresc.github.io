  - role: Software Engineer - Digital Fulfillment
    company: Tokopedia
    period: Jul 2022 - Aug 2024
    location: Indonesia
    summary: Managed digital fulfillment ecosystem for 4,000+ SKUs across 100+ suppliers, handling high-traffic microservices (>300 RPS). Maintained a 98% Fulfillment Success Rate through rigorous testing, proactive monitoring, and cross-team collaboration.
    projects:
      - id: fulfillmentDropdown
        title: Fulfillment Nextgen
        description: Fulfillment Nexgen is a project aimed at creating a new service that separates fulfillment processes from old codebase. This initiative was driven by complexity and difficulty in maintaining the current codebase, which also caused multiple teams to work on the same code, leading to challenges in debugging and integration testing.
        impact:
          - Development Efficiency: Reduced the time needed to develop new features.
          - Testing Improvement: Simplified and expedited the integration testing process.
          - Code Quality: Enhanced the readability and debugging of the code.
          - Deployment Confidence: Enabled the team to deploy more confidently and efficiently.
        strengths:
          - Development: Contributed on service creation, covering migration, architecture, and patterns.
          - Message Queuing: Implemented queuing for async processing, throttling promos vs. orders.
          - Custom Interceptors: Built gRPC and DB interceptors to monitor latency and query performance.
          - DB Retrier: Developed a custom retrier to reduce master usage and prevent slave lag.
          - Feature Migration: Led the migration of void and auto-frozen features.
          - Query Reminder: Implemented automated checks to ensure future database partitions are prepared.
      - id: smartCardDropdown
        title: Smart-Card Auto Escalation
        description: Mandiri e-money is a leading smart-card payment method for digital services. According to Cex data, around 1% of users face errors when updating their card balance. These issues required manual support, wasting users' time and overburdening Tokopedia care. To resolve this, we developed an automated escalation feature.
        impact:
          - Support Efficiency: Automated escalation reduced customer support tickets by 60%.
          - Cost Savings: Monthly savings reached tens of millions of rupiah through reduced operational costs.
          - User Convenience: Users no longer had to manually report issues, improving their experience.
        strengths:
          - Collaboration: Worked closely with cross-functional teams for seamless project support.
          - Feedback Mechanisms: Implemented feedback emails, categorizing responses into different actions.
          - Tech Advancements: Developed modular, reusable code and facilitated migration to new microservices.
      - id: performance
        title: High-Performance & Cost Optimization
        description: A comprehensive initiative to improve system latency, reliability, and cloud efficiency.
        impact:
          - Latency: Improved order fulfillment speed from 4s to 1s.
          - Conversion: Achieved a 200% CVR improvement by optimizing caching strategies.
          - Reliability: Eliminated Single Point of Failure (SPOF) by implementing auto-scaling for cron jobs.
          - Cost: Reduced cloud infrastructure costs by refactoring specific services into a monolithic architecture.

