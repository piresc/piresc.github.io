        display: grid;
        place-items: center;
        padding: 24px;

      main {
        max-width: 560px;
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(3rem, 8vw, 5rem);

      }

      p {
        margin: 0 0 24px;
        color: rgba(222, 219, 200, 0.72);
        font-size: 1rem;
        line-height: 1.6;

      a {
        display: inline-block;
